name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Build
        id: build
        run: gradle build --stacktrace > build_log.txt 2>&1 || echo "failed=true" >> $GITHUB_OUTPUT

      - name: Upload error log
        if: steps.build.outputs.failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: error.txt
          path: build_log.txt

      - name: Report error as issue
        if: steps.build.outputs.failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tail -c 55000 build_log.txt > build_log_trimmed.txt
          jq -n --rawfile body build_log_trimmed.txt --arg title "Build failed - run ${{ github.run_id }}" '{title: $title, body: ("```\n" + $body + "\n```")}' > issue_payload.json
          curl -s -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues \
            -d @issue_payload.json

      - name: Fail if build failed
        if: steps.build.outputs.failed == 'true'
        run: exit 1

      - name: Upload jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nx-oldcombat-jar
          path: build/libs/*.jar

      - name: Create Release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
