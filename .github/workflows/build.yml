name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        id: build
        run: gradle build --stacktrace 2> error.txt || echo "failed=true" >> $GITHUB_OUTPUT

      - name: Upload error log
        if: steps.build.outputs.failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: error.txt
          path: error.txt

      - name: Fail if build failed
        if: steps.build.outputs.failed == 'true'
        run: exit 1

      - name: Upload jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nx-oldcombat-jar
          path: build/libs/*.jar
